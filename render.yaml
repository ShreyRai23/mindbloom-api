services:
  - type: web
    name: mindbloom-api
    runtime: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
      php artisan storage:link
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: "MindBloom AI"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: mindbloom-api
          property: host
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: mindbloom-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mindbloom-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: mindbloom-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: mindbloom-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mindbloom-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGO
        value: HS256
      - key: JWT_TTL
        value: "1440"
      - key: FILESYSTEM_DISK
        value: public
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: FRONTEND_URL
        sync: false   # Set this manually in Render dashboard after Vercel gives you the URL
      - key: GEMINI_API_KEY
        sync: false   # Set this manually — never commit to git
      - key: GEMINI_MODEL
        value: gemini-2.0-flash-exp
      - key: GEMINI_API_URL
        value: https://generativelanguage.googleapis.com/v1beta/models

databases:
  - name: mindbloom-db
    plan: free
    databaseName: mindbloom_db
